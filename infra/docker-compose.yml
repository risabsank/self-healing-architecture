services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: self_healing
      POSTGRES_USER: self_healing
      POSTGRES_PASSWORD: self_healing
    ports:
      - "5432:5432"
    volumes:
      - control-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U self_healing -d self_healing"]
      interval: 5s
      timeout: 5s
      retries: 20

  target-db:
    image: postgres:16
    environment:
      POSTGRES_DB: target_app
      POSTGRES_USER: target_app
      POSTGRES_PASSWORD: target_app
    ports:
      - "5433:5432"
    volumes:
      - target-postgres-data:/var/lib/postgresql/data
      - ../target-app/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U target_app -d target_app"]
      interval: 5s
      timeout: 5s
      retries: 20

  target-api:
    build:
      context: ../target-app/api
    environment:
      APP_NAME: breakable-target-api
      DATABASE_URL: postgresql://target_app:target_app@target-db:5432/target_app
      REQUIRED_ENV_NAME: TARGET_REQUIRED_SECRET
      TARGET_REQUIRED_SECRET: runtime-foundation-secret
      FEATURE_CHECKOUT_ENABLED: "true"
    ports:
      - "8001:8001"
    depends_on:
      target-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, sys, urllib.request; body=json.loads(urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()); sys.exit(0 if body.get('status') == 'healthy' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12

  control-api:
    build:
      context: ../services/control-api
    environment:
      DATABASE_URL: postgresql://self_healing:self_healing@postgres:5432/self_healing
      TARGET_API_BASE_URL: http://target-api:8001
      MONITOR_INTERVAL_SECONDS: "10"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      target-api:
        condition: service_started

volumes:
  control-postgres-data:
  target-postgres-data:
