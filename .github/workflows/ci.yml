name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install control API dependencies
        run: pip install -r services/control-api/requirements.txt

      - name: Static compile
        run: python -X pycache_prefix=/tmp/self-healing-pycache -m compileall services/control-api/app target-app/api

      - name: Target app unit tests
        run: PYTHONPATH=target-app/api python -m unittest discover target-app/api/tests

      - name: Compose config validation
        run: docker compose -f infra/docker-compose.yml config

      - name: Build containers
        run: docker compose -f infra/docker-compose.yml build
